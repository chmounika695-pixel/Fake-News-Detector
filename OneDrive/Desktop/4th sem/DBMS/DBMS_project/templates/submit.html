{% extends "base.html" %}
{% block content %}

<div class="form-container" style="max-width: 800px;">
    <h2 style="margin-bottom: 1.5rem;">Submit a News Article</h2>
<div style="background:red;color:white;padding:10px;">
    TESTING NEW FILE
</div>
```
<form action="{{ url_for('submit_news') }}"
      method="POST"
      enctype="multipart/form-data">

    <div class="form-group">
        <label>Submission Type</label>
        <select id="submission_type"
                name="submission_type"
                class="form-control">

            <option value="text">
                Text Article
            </option>

            <option value="image">
                Image Upload
            </option>

        </select>
    </div>

    <div id="text-fields">

        <div class="form-group">
            <label for="headline">Headline</label>
            <input type="text"
                   id="headline"
                   name="headline"
                   class="form-control"
                   placeholder="e.g. Breaking: New Discoveries in Space">
        </div>

        <div class="form-group">
            <label for="url">Source URL</label>
            <input type="url"
                   id="url"
                   name="url"
                   class="form-control"
                   placeholder="https://example.com/article">
        </div>

        <div class="form-group">
            <label for="image_url">Image URL (Optional)</label>
            <input type="url"
                   id="image_url"
                   name="image_url"
                   class="form-control"
                   placeholder="https://example.com/image.jpg">
        </div>

        <div class="form-group">
            <label for="content">Article Content / Summary</label>
            <textarea id="content"
                      name="content"
                      class="form-control"
                      rows="6"
                      placeholder="Enter article content"></textarea>
        </div>

    </div>

    <div class="form-group">
        <label for="category">Category</label>

        <select id="category"
                name="category"
                class="form-control"
                required>

            <option value="Politics">Politics</option>
            <option value="Technology">Technology</option>
            <option value="Health">Health</option>
            <option value="Science">Science</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Other">Other</option>

        </select>
    </div>

    <div id="image-fields">

        <div class="form-group">
            <label for="news_image">
                Upload News Image
            </label>

            <input type="file"
                   id="news_image"
                   name="news_image"
                   class="form-control"
                   accept=".jpg,.jpeg,.png">
        </div>

    </div>

    <button type="submit"
            class="btn btn-primary">
        Submit for Analysis
    </button>

</form>
```

</div>

{% endblock %}
